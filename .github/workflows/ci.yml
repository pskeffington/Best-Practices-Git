name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-audit:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Run tests
        run: pytest

      - name: Check workflow CLI
        run: bpg-workflow status

      - name: Initialize manuscript artifacts
        run: bpg-workflow init-artifacts --root .

      - name: Run workflow audit
        run: bpg-workflow audit --root .

      - name: Upload audit artifacts
        uses: actions/upload-artifact@v4
        with:
          name: workflow-audit-artifacts
          path: artifacts/audits/
          if-no-files-found: error
